<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}"
      lang="id">
<head>
    <title>Input Detail Pajak</title>
</head>
<body>
    <h1 id="page-title" layout:fragment="page-title">Input Detail Pajak</h1>

    <div layout:fragment="content" class="h-full flex flex-col overflow-y-auto">
        <div class="max-w-6xl">
            <!-- Success Message -->
            <div th:if="${successMessage}" class="mb-6 p-4 rounded-lg bg-green-50 border border-green-200">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-green-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span class="text-sm font-medium text-green-800" th:text="${successMessage}">Success</span>
                </div>
            </div>

            <!-- Breadcrumb -->
            <nav class="flex items-center space-x-2 text-sm text-gray-500 mb-6">
                <a th:href="@{/transactions}" class="hover:text-primary-600 transition-colors">Transaksi</a>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <span class="text-gray-900">Input Detail Pajak</span>
            </nav>

            <!-- Date Range Filter -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6 p-4">
                <form th:action="@{/transactions/tax-details/bulk}" method="get" class="flex items-end gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Dari Tanggal</label>
                        <input type="date" name="startDate" th:value="${startDate}"
                               class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Sampai Tanggal</label>
                        <input type="date" name="endDate" th:value="${endDate}"
                               class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    <button type="submit"
                            class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 transition-colors">
                        Filter
                    </button>
                </form>
            </div>

            <!-- Bulk Entry Form -->
            <form th:action="@{/transactions/tax-details/bulk}" method="post" data-testid="bulk-form">
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <!-- Header -->
                    <div class="px-4 py-3 bg-gray-50 border-b border-gray-200">
                        <div class="flex items-center justify-between">
                            <h2 class="text-sm font-semibold text-gray-700">Transaksi yang Belum Ada Detail Pajak</h2>
                            <span class="text-xs text-gray-500" th:text="${#lists.size(transactions)} + ' transaksi'">0 transaksi</span>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-12">
                        <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <h3 class="mt-2 text-sm font-medium text-gray-900">Semua transaksi sudah memiliki detail pajak</h3>
                        <p class="mt-1 text-sm text-gray-500">Tidak ada transaksi PPN/PPh yang perlu dilengkapi</p>
                    </div>

                    <!-- Transaction List -->
                    <div th:unless="${#lists.isEmpty(transactions)}" class="divide-y divide-gray-100">
                        <div th:each="trx : ${transactions}"
                             th:data-testid="${'bulk-row-' + trx.id}"
                             class="px-4 py-4 hover:bg-gray-50 transition-colors">
                            <div class="flex flex-col md:flex-row md:items-center gap-3">
                                <!-- Transaction Info -->
                                <div class="flex-shrink-0 md:w-1/3">
                                    <a th:href="@{/transactions/{id}(id=${trx.id})}"
                                       class="text-sm font-medium text-primary-600 hover:text-primary-800 hover:underline"
                                       th:text="${trx.transactionNumber}">TRX-001</a>
                                    <p class="text-xs text-gray-500">
                                        <span th:text="${#temporals.format(trx.transactionDate, 'dd MMM yyyy')}">01 Jan 2025</span>
                                        <span class="mx-1">|</span>
                                        <span th:text="${trx.journalTemplate?.templateName}">Template</span>
                                    </p>
                                    <p class="text-xs text-gray-500 truncate" th:text="${trx.description}">Description</p>
                                    <p class="text-sm font-medium mt-1" th:text="'Rp ' + ${#numbers.formatDecimal(trx.amount, 0, 'POINT', 0, 'COMMA')}">Rp 0</p>
                                </div>

                                <!-- Input Fields -->
                                <div class="flex-1 grid grid-cols-1 md:grid-cols-4 gap-2">
                                    <!-- Tax Type -->
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-0.5">Jenis Pajak</label>
                                        <select th:name="${'taxType_' + trx.id}" data-testid="bulk-tax-type"
                                                class="w-full px-2 py-1.5 border border-gray-300 rounded text-xs focus:ring-primary-500 focus:border-primary-500">
                                            <option value="">--</option>
                                            <th:block th:if="${suggestionsMap.containsKey(trx.id)}">
                                                <th:block th:each="s : ${suggestionsMap.get(trx.id)}">
                                                    <option th:value="${s.taxType.name()}" th:text="${s.taxType.indonesianName}" selected>Type</option>
                                                </th:block>
                                            </th:block>
                                            <th:block th:each="tt : ${taxTypes}">
                                                <option th:value="${tt.name()}" th:text="${tt.indonesianName}">Type</option>
                                            </th:block>
                                        </select>
                                    </div>

                                    <!-- Faktur/Bupot Number -->
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-0.5">No. Faktur/Bupot</label>
                                        <input type="text" th:name="${'fakturNumber_' + trx.id}" data-testid="bulk-faktur-number"
                                               class="w-full px-2 py-1.5 border border-gray-300 rounded text-xs focus:ring-primary-500 focus:border-primary-500"
                                               placeholder="Nomor faktur/bupot">
                                    </div>

                                    <!-- Counterparty -->
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-0.5">Lawan Transaksi</label>
                                        <input type="text" th:name="${'counterpartyName_' + trx.id}" data-testid="bulk-counterparty"
                                               th:value="${suggestionsMap.containsKey(trx.id) and !suggestionsMap.get(trx.id).isEmpty()} ? ${suggestionsMap.get(trx.id)[0].name} : ''"
                                               class="w-full px-2 py-1.5 border border-gray-300 rounded text-xs focus:ring-primary-500 focus:border-primary-500"
                                               placeholder="Nama">
                                    </div>

                                    <!-- NPWP -->
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-0.5">NPWP</label>
                                        <input type="text" th:name="${'counterpartyNpwp_' + trx.id}" data-testid="bulk-npwp"
                                               th:value="${suggestionsMap.containsKey(trx.id) and !suggestionsMap.get(trx.id).isEmpty()} ? ${suggestionsMap.get(trx.id)[0].npwp} : ''"
                                               class="w-full px-2 py-1.5 border border-gray-300 rounded text-xs focus:ring-primary-500 focus:border-primary-500"
                                               placeholder="NPWP" maxlength="20">
                                    </div>
                                </div>

                                <!-- Hidden fields for suggested amounts -->
                                <th:block th:if="${suggestionsMap.containsKey(trx.id) and !suggestionsMap.get(trx.id).isEmpty()}">
                                    <input type="hidden" th:name="${'dpp_' + trx.id}" th:value="${suggestionsMap.get(trx.id)[0].dpp}">
                                    <input type="hidden" th:name="${'ppn_' + trx.id}" th:value="${suggestionsMap.get(trx.id)[0].ppn}">
                                    <input type="hidden" th:name="${'grossAmount_' + trx.id}" th:value="${suggestionsMap.get(trx.id)[0].grossAmount}">
                                    <input type="hidden" th:name="${'taxRate_' + trx.id}" th:value="${suggestionsMap.get(trx.id)[0].taxRate}">
                                    <input type="hidden" th:name="${'taxAmount_' + trx.id}" th:value="${suggestionsMap.get(trx.id)[0].taxAmount}">
                                </th:block>
                            </div>
                        </div>
                    </div>

                    <!-- Footer with Save Button -->
                    <div th:unless="${#lists.isEmpty(transactions)}" class="px-4 py-3 bg-gray-50 border-t border-gray-200 flex justify-end">
                        <button type="submit" data-testid="btn-bulk-save"
                                class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 transition-colors">
                            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            Simpan Semua
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
