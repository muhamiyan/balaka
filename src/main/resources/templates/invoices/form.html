<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(${invoice.id != null} ? 'Edit Invoice' : 'Invoice Baru', ~{::#page-title}, ~{::section}, ~{::script})}"
      lang="id">
<head>
    <title th:text="${invoice.id != null} ? 'Edit Invoice' : 'Invoice Baru'">Invoice</title>
</head>
<body>
    <h1 id="page-title" th:text="${invoice.id != null} ? 'Edit Invoice' : 'Invoice Baru'">Invoice</h1>

    <section class="max-w-4xl">
        <!-- Breadcrumb -->
        <nav class="flex items-center space-x-2 text-sm text-gray-500 mb-6">
            <a th:href="@{/invoices}" class="hover:text-primary-600 transition-colors">Invoice</a>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="text-gray-900" th:text="${invoice.id != null} ? 'Edit Invoice' : 'Invoice Baru'">Invoice</span>
        </nav>

        <div class="bg-white rounded-lg shadow p-6" x-data="invoiceForm">
            <form th:action="${invoice.id != null} ? @{/invoices/{invoiceNumber}(invoiceNumber=${invoice.invoiceNumber})} : @{/invoices/new}"
                  th:object="${invoice}"
                  method="post" class="space-y-6">

                <!-- Validation Errors -->
                <div th:if="${#fields.hasErrors('*')}" class="p-4 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-sm text-red-600 font-medium">Terdapat kesalahan:</p>
                    <ul class="mt-2 text-sm text-red-600 list-disc list-inside">
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Error</li>
                    </ul>
                </div>

                <!-- Invoice Number -->
                <div>
                    <label for="invoiceNumber" class="block text-sm font-medium text-gray-700 mb-1">Nomor Invoice</label>
                    <input type="text" id="invoiceNumber" th:field="*{invoiceNumber}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500 font-mono"
                           th:classappend="${#fields.hasErrors('invoiceNumber')} ? 'border-red-500' : ''"
                           placeholder="Auto-generated jika kosong">
                    <p class="mt-1 text-xs text-gray-500">Kosongkan untuk nomor otomatis (format: INV-YYYYMM-XXXX)</p>
                    <p th:if="${#fields.hasErrors('invoiceNumber')}" th:errors="*{invoiceNumber}" class="mt-1 text-sm text-red-500"></p>
                </div>

                <!-- Client (combobox) -->
                <div x-data="clientPicker"
                     th:data-initial-id="${invoice.client != null ? invoice.client.id : ''}"
                     th:data-initial-label="${invoice.clientLabel}">
                    <label for="clientLabel" class="block text-sm font-medium text-gray-700 mb-1">Klien *</label>
                    <div class="relative">
                        <input type="text" id="clientLabel" name="clientLabel" x-model="label"
                               @input.debounce.300ms="search()" @focus="focusPicker()" @click.away="open = false"
                               autocomplete="off"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                               th:classappend="${#fields.hasErrors('client')} ? 'border-red-500' : ''"
                               placeholder="Ketik kode atau nama klien..." required>
                        <input type="hidden" name="client.id" :value="selectedId">
                        <div x-show="open &amp;&amp; results.length > 0"
                             class="absolute z-10 mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg max-h-60 overflow-auto">
                            <template x-for="c in results" :key="c.id">
                                <button type="button" @click="select(c)"
                                        data-testid="client-picker-result"
                                        class="block w-full text-left px-3 py-2 text-sm hover:bg-primary-50">
                                    <span class="font-medium" x-text="c.code"></span>
                                    <span class="text-gray-500"> — </span>
                                    <span x-text="c.name"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                    <p th:if="${#fields.hasErrors('client')}" th:errors="*{client}" class="mt-1 text-sm text-red-500"></p>
                </div>

                <!-- Project (Optional) -->
                <div>
                    <label for="project" class="block text-sm font-medium text-gray-700 mb-1">Proyek</label>
                    <select id="project" th:field="*{project.id}"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
                        <option value="">-- Tanpa Proyek --</option>
                        <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.code + ' - ' + p.name}">Project</option>
                    </select>
                </div>

                <!-- Dates -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="invoiceDate" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Invoice *</label>
                        <input type="date" id="invoiceDate" th:field="*{invoiceDate}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                               th:classappend="${#fields.hasErrors('invoiceDate')} ? 'border-red-500' : ''"
                               required>
                        <p th:if="${#fields.hasErrors('invoiceDate')}" th:errors="*{invoiceDate}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label for="dueDate" class="block text-sm font-medium text-gray-700 mb-1">Jatuh Tempo *</label>
                        <input type="date" id="dueDate" th:field="*{dueDate}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                               th:classappend="${#fields.hasErrors('dueDate')} ? 'border-red-500' : ''"
                               required>
                        <p th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                </div>

                <!-- Line Items -->
                <div class="border-t pt-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-sm font-medium text-gray-900">Item Invoice</h3>
                        <button type="button" @click="addLine()"
                                class="px-3 py-1 text-sm bg-primary-100 text-primary-700 rounded hover:bg-primary-200">
                            + Tambah Item
                        </button>
                    </div>

                    <div class="space-y-3">
                        <template x-for="(line, index) in lines" :key="index">
                            <div class="grid grid-cols-12 gap-2 items-start p-3 bg-gray-50 rounded-lg">
                                <div class="col-span-3 relative">
                                    <label :for="'inv-lineProductLabel-' + index" class="block text-xs text-gray-500 mb-1">Produk/Jasa</label>
                                    <input type="text" :id="'inv-lineProductLabel-' + index"
                                           x-model="line.productLabel"
                                           @input.debounce.300ms="searchProducts(line)"
                                           @focus="line.pickerOpen = true"
                                           @click.away="line.pickerOpen = false"
                                           autocomplete="off"
                                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm"
                                           placeholder="Ketik nama produk/jasa...">
                                    <input type="hidden" :name="'lineProductId'" :value="line.productId">
                                    <div x-show="line.pickerOpen &amp;&amp; line.productResults.length > 0"
                                         class="absolute z-10 mt-1 w-full bg-white border border-gray-300 rounded shadow-lg max-h-60 overflow-auto">
                                        <template x-for="p in line.productResults" :key="p.id">
                                            <button type="button"
                                                    @click="selectProduct(line, p)"
                                                    class="block w-full text-left px-3 py-2 text-sm hover:bg-primary-50">
                                                <span class="font-medium" x-text="p.code"></span>
                                                <span class="text-gray-500"> — </span>
                                                <span x-text="p.name"></span>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <div class="col-span-2">
                                    <label :for="'inv-lineDescription-' + index" class="block text-xs text-gray-500 mb-1">Deskripsi *</label>
                                    <input type="text" :id="'inv-lineDescription-' + index" :name="'lineDescription'" x-model="line.description"
                                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm" required>
                                </div>
                                <div class="col-span-2">
                                    <label :for="'inv-lineQuantity-' + index" class="block text-xs text-gray-500 mb-1">Qty</label>
                                    <input type="number" :id="'inv-lineQuantity-' + index" :name="'lineQuantity'" x-model="line.quantity"
                                           @input="calcLine(line)"
                                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm" step="0.01" min="0">
                                </div>
                                <div class="col-span-2">
                                    <label :for="'inv-lineUnitPrice-' + index" class="block text-xs text-gray-500 mb-1">Harga Satuan</label>
                                    <input type="number" :id="'inv-lineUnitPrice-' + index" :name="'lineUnitPrice'" x-model="line.unitPrice"
                                           @input="calcLine(line)"
                                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm" step="1" min="0">
                                </div>
                                <div class="col-span-1">
                                    <label :for="'inv-lineTaxRate-' + index" class="block text-xs text-gray-500 mb-1">PPN %</label>
                                    <input type="number" :id="'inv-lineTaxRate-' + index" :name="'lineTaxRate'" x-model="line.taxRate"
                                           @input="calcLine(line)"
                                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm" step="0.01" min="0">
                                </div>
                                <div class="col-span-1">
                                    <span class="block text-xs text-gray-500 mb-1">Jumlah</span>
                                    <p class="px-3 py-2 text-sm font-medium" x-text="formatRp(line.amount)">0</p>
                                </div>
                                <div class="col-span-1 flex items-end pb-2">
                                    <button type="button" @click="removeLine(index)"
                                            class="p-2 text-red-500 hover:text-red-700" title="Hapus">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Totals -->
                    <div class="mt-4 flex justify-end" x-show="lines.length > 0">
                        <div class="w-64 space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">Subtotal</span>
                                <span class="font-medium" x-text="formatRp(subtotal())">Rp 0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">PPN</span>
                                <span class="font-medium" x-text="formatRp(totalTax())">Rp 0</span>
                            </div>
                            <div class="flex justify-between border-t pt-2">
                                <span class="font-medium text-gray-900">Total</span>
                                <span class="font-bold text-lg" x-text="formatRp(grandTotal())">Rp 0</span>
                            </div>
                        </div>
                    </div>

                    <!-- Fallback: direct amount if no lines -->
                    <div class="mt-4" x-show="lines.length === 0">
                        <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Jumlah (Rp) *</label>
                        <input type="number" id="amount" th:field="*{amount}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                               placeholder="0" min="0" step="1000">
                    </div>
                </div>

                <!-- Notes -->
                <div>
                    <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Catatan</label>
                    <textarea id="notes" th:field="*{notes}" rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
                              placeholder="Catatan tambahan"></textarea>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-end gap-3 pt-4 border-t">
                    <a th:href="@{/invoices}"
                       class="px-4 py-2 text-gray-600 hover:text-gray-900">Batal</a>
                    <button id="btn-simpan" type="submit"
                            class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
                        Simpan
                    </button>
                </div>
            </form>
        </div>
    </section>

        <script th:inline="javascript" th:attr="nonce=${cspNonce}">
            // CSP-compatible: Register Alpine component before Alpine processes the DOM
            document.addEventListener('alpine:init', function() {
                var existingLines = /*[[${lines}]]*/ [];
                Alpine.data('invoiceForm', function() {
                    return {
                        lines: existingLines.length > 0
                            ? existingLines.map(function(l) {
                                return {
                                    productId: l.productId || '',
                                    productLabel: l.productLabel || '',
                                    productResults: [],
                                    pickerOpen: false,
                                    description: l.description || '',
                                    quantity: l.quantity || 1,
                                    unitPrice: l.unitPrice || 0,
                                    taxRate: l.taxRate || '',
                                    amount: l.amount || 0
                                };
                            })
                            : [],
                        addLine: function() {
                            this.lines.push({
                                productId: '', productLabel: '', productResults: [], pickerOpen: false,
                                description: '', quantity: 1, unitPrice: 0, taxRate: '', amount: 0
                            });
                        },
                        searchProducts: function(line) {
                            var q = encodeURIComponent(line.productLabel || '');
                            fetch('/products/search?q=' + q, { headers: { 'Accept': 'application/json' } })
                                .then(function(r) { return r.ok ? r.json() : []; })
                                .then(function(data) { line.productResults = data; });
                        },
                        selectProduct: function(line, p) {
                            line.productId = p.id;
                            line.productLabel = (p.code ? p.code + ' - ' : '') + p.name;
                            if (!line.description) {
                                line.description = p.name;
                            }
                            if ((!line.unitPrice || Number.parseFloat(line.unitPrice) === 0) && p.sellingPrice) {
                                line.unitPrice = p.sellingPrice;
                                this.calcLine(line);
                            }
                            line.productResults = [];
                            line.pickerOpen = false;
                        },
                        removeLine: function(index) {
                            this.lines.splice(index, 1);
                        },
                        calcLine: function(line) {
                            var qty = Number.parseFloat(line.quantity) || 0;
                            var price = Number.parseFloat(line.unitPrice) || 0;
                            line.amount = qty * price;
                        },
                        subtotal: function() {
                            return this.lines.reduce(function(sum, l) { return sum + (Number.parseFloat(l.amount) || 0); }, 0);
                        },
                        totalTax: function() {
                            return this.lines.reduce(function(sum, l) {
                                var rate = Number.parseFloat(l.taxRate) || 0;
                                return sum + ((Number.parseFloat(l.amount) || 0) * rate / 100);
                            }, 0);
                        },
                        grandTotal: function() {
                            return this.subtotal() + this.totalTax();
                        },
                        formatRp: function(val) {
                            return 'Rp ' + Math.round(val).toLocaleString('id-ID');
                        }
                    };
                });
            });
        </script>
</body>
</html>
