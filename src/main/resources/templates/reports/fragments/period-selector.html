<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Reusable period/date selector fragment for report pages.

  Usage (range mode — startDate + endDate):
    <div th:replace="~{reports/fragments/period-selector :: period-selector('range')}"></div>

  Usage (as-of mode — single asOfDate):
    <div th:replace="~{reports/fragments/period-selector :: period-selector('as-of')}"></div>

  Reads from model: yearPresets, periodYears, startDate, endDate, asOfDate
  Must be placed inside a <form> element.
-->
<body>
<div th:fragment="period-selector(mode)">

    <!-- Quick Presets -->
    <div th:if="${yearPresets != null and !yearPresets.isEmpty()}" class="mb-3">
        <label class="block text-sm font-medium text-gray-700 mb-2">Periode Cepat</label>
        <div th:each="yp : ${yearPresets}" class="mb-2">
            <div class="flex flex-wrap gap-1.5 items-center">
                <!-- Year label -->
                <span class="text-xs font-semibold text-gray-500 w-10 shrink-0" th:text="${yp.year}">2025</span>

                <!-- Full year -->
                <button type="button"
                        th:data-start="|${yp.year}-01-01|"
                        th:data-end="|${yp.year}-12-31|"
                        th:data-mode="${mode}"
                        onclick="selectPeriod(this)"
                        class="period-preset px-2 py-1 text-xs font-medium rounded border border-primary-200 text-primary-700 bg-primary-50 hover:bg-primary-100 transition-colors">
                    Tahun
                </button>

                <!-- Quarters -->
                <button type="button"
                        th:data-start="|${yp.year}-01-01|" th:data-end="|${yp.year}-03-31|" th:data-mode="${mode}"
                        onclick="selectPeriod(this)"
                        class="period-preset px-2 py-1 text-xs rounded border border-gray-200 text-gray-600 hover:bg-gray-100 transition-colors">Q1</button>
                <button type="button"
                        th:data-start="|${yp.year}-04-01|" th:data-end="|${yp.year}-06-30|" th:data-mode="${mode}"
                        onclick="selectPeriod(this)"
                        class="period-preset px-2 py-1 text-xs rounded border border-gray-200 text-gray-600 hover:bg-gray-100 transition-colors">Q2</button>
                <button type="button"
                        th:data-start="|${yp.year}-07-01|" th:data-end="|${yp.year}-09-30|" th:data-mode="${mode}"
                        onclick="selectPeriod(this)"
                        class="period-preset px-2 py-1 text-xs rounded border border-gray-200 text-gray-600 hover:bg-gray-100 transition-colors">Q3</button>
                <button type="button"
                        th:data-start="|${yp.year}-10-01|" th:data-end="|${yp.year}-12-31|" th:data-mode="${mode}"
                        onclick="selectPeriod(this)"
                        class="period-preset px-2 py-1 text-xs rounded border border-gray-200 text-gray-600 hover:bg-gray-100 transition-colors">Q4</button>

                <!-- Monthly toggle -->
                <button type="button"
                        th:onclick="|toggleMonths('months-' + ${yp.year})|"
                        class="px-2 py-1 text-xs rounded border border-gray-200 text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
                        title="Tampilkan bulan">
                    <svg class="w-3 h-3 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
            </div>

            <!-- Monthly buttons (hidden by default) -->
            <div th:id="|months-${yp.year}|" class="hidden flex flex-wrap gap-1.5 mt-1.5 ml-12">
                <button th:each="mp : ${yp.months}"
                        type="button"
                        th:data-start="${mp.startDate}"
                        th:data-end="${mp.endDate}"
                        th:data-mode="${mode}"
                        onclick="selectPeriod(this)"
                        th:text="${mp.label}"
                        class="period-preset px-2 py-1 text-xs rounded border border-gray-200 text-gray-600 hover:bg-gray-100 transition-colors">Jan</button>
            </div>
        </div>
    </div>

    <!-- Date Inputs -->
    <div class="flex flex-wrap items-end gap-3">
        <!-- Range mode: startDate + endDate -->
        <th:block th:if="${mode == 'range'}">
            <div class="flex-1 min-w-[160px]">
                <label for="startDate" class="block text-sm font-medium text-gray-700 mb-1">Dari Tanggal</label>
                <input type="date" id="startDate" name="startDate" th:value="${startDate}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
            </div>
            <div class="flex-1 min-w-[160px]">
                <label for="endDate" class="block text-sm font-medium text-gray-700 mb-1">Sampai Tanggal</label>
                <input type="date" id="endDate" name="endDate" th:value="${endDate}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
            </div>
        </th:block>

        <!-- As-of mode: single asOfDate -->
        <th:block th:if="${mode == 'as-of'}">
            <div class="flex-1 min-w-[160px]">
                <label for="asOfDate" class="block text-sm font-medium text-gray-700 mb-1">Per Tanggal</label>
                <input type="date" id="asOfDate" name="asOfDate" th:value="${asOfDate}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
            </div>
        </th:block>

        <div>
            <button id="btn-generate" type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 transition-colors">
                Tampilkan
            </button>
        </div>
    </div>

    <!-- Fragment JS (idempotent — safe to include multiple times) -->
    <script th:inline="none" th:attr="nonce=${cspNonce}">
        if (!window._periodSelectorLoaded) {
            window._periodSelectorLoaded = true;

            window.selectPeriod = function(btn) {
                var start = btn.getAttribute('data-start');
                var end = btn.getAttribute('data-end');
                var mode = btn.getAttribute('data-mode');

                // Cap end date to today if in the future
                var today = new Date().toISOString().split('T')[0];
                if (end > today) end = today;

                var form = btn.closest('form');
                if (mode === 'as-of') {
                    form.querySelector('[name="asOfDate"]').value = end;
                } else {
                    form.querySelector('[name="startDate"]').value = start;
                    form.querySelector('[name="endDate"]').value = end;
                }
                form.submit();
            };

            window.toggleMonths = function(id) {
                document.getElementById(id).classList.toggle('hidden');
            };
        }
    </script>
</div>
</body>
</html>
