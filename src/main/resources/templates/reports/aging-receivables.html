<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Umur Piutang', ~{::#page-title}, ~{::section}, ~{})}"
      lang="id">
<head>
    <title>Umur Piutang</title>
</head>
<body>
    <h1 id="page-title">Umur Piutang</h1>

    <section class="h-full flex flex-col overflow-y-auto" data-testid="aging-receivables">
        <div class="max-w-6xl">
            <!-- Breadcrumb -->
            <nav class="flex items-center space-x-2 text-sm text-gray-500 mb-6">
                <a th:href="@{/reports}" class="hover:text-primary-600 transition-colors">Laporan</a>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <span class="text-gray-900">Umur Piutang</span>
            </nav>

            <!-- Filter -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
                <form th:action="@{/reports/aging/receivables}" method="get" class="space-y-3">
                    <div th:replace="~{reports/fragments/period-selector :: period-selector('as-of')}"></div>
                </form>
            </div>

            <!-- Summary Cards -->
            <div th:replace="~{reports/fragments/aging-common :: summary-cards(${report})}"></div>

            <!-- Aging Table -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                    <h2 class="text-lg font-bold text-gray-900">Umur Piutang per Klien</h2>
                    <p class="text-sm text-gray-500 mt-1" th:text="'Per tanggal ' + ${#temporals.format(asOfDate, 'd MMMM yyyy')}">Per tanggal</p>
                </div>

                <div th:if="${report.rows.isEmpty()}" class="p-8 text-center">
                    <p class="text-gray-500" data-testid="no-data">Tidak ada piutang yang belum dilunasi</p>
                </div>

                <table th:if="${!report.rows.isEmpty()}" class="min-w-full divide-y divide-gray-200" data-testid="aging-table">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Klien</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Belum Jatuh Tempo</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">1-30 Hari</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">31-60 Hari</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">61-90 Hari</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">&gt;90 Hari</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Total</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr th:each="row : ${report.rows}" class="hover:bg-gray-50">
                            <td class="px-4 py-3">
                                <div class="text-sm font-medium text-gray-900" th:text="${row.name}">Client</div>
                                <div class="text-xs text-gray-500" th:text="${row.code}">CLI-001</div>
                            </td>
                            <td class="px-4 py-3 text-right text-sm font-mono" th:text="'Rp ' + ${#numbers.formatDecimal(row.bucket.current, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                            <td class="px-4 py-3 text-right text-sm font-mono" th:text="'Rp ' + ${#numbers.formatDecimal(row.bucket.days1to30, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                            <td class="px-4 py-3 text-right text-sm font-mono" th:text="'Rp ' + ${#numbers.formatDecimal(row.bucket.days31to60, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                            <td class="px-4 py-3 text-right text-sm font-mono" th:text="'Rp ' + ${#numbers.formatDecimal(row.bucket.days61to90, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                            <td class="px-4 py-3 text-right text-sm font-mono" th:text="'Rp ' + ${#numbers.formatDecimal(row.bucket.over90, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                            <td class="px-4 py-3 text-right text-sm font-mono font-bold" th:text="'Rp ' + ${#numbers.formatDecimal(row.bucket.total, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                        </tr>
                    </tbody>
                    <tfoot th:replace="~{reports/fragments/aging-common :: table-footer(${report})}"></tfoot>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
