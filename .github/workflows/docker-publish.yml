name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - '*-RELEASE'
  pull_request:
    branches:
      - main
  schedule:
    # Weekly rebuild of :main to pick up base image CVE patches (Mondays 18:00 UTC = Tue 01:00 WIB)
    - cron: '0 18 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manual tag (e.g. 2025.12-RELEASE or edge)'
        required: true
        default: 'edge'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect fork PR
        id: fork
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.fork.outputs.is_fork == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.fork.outputs.is_fork == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/balaka
            artivisi/balaka
          # Tag matrix:
          #   Push to main           → :main, :main-<sha>
          #   Pull request           → :pr-<number>
          #   Tag *-RELEASE          → :2025.12-RELEASE, :2025.12, :latest    (CalVer per docs/03-operations-guide.md)
          #   Patch *-RELEASE        → :2025.12.1-RELEASE, :2025.12.1, :2025.12, :latest
          #   Schedule (weekly cron) → :main (rebuilt with fresh base layers)
          #   workflow_dispatch      → user-supplied tag, default :edge
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=match,pattern=(.*)-RELEASE,group=1
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && endsWith(github.ref, '-RELEASE') }}
            type=raw,value=main,enable=${{ github.event_name == 'schedule' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Balaka
            org.opencontainers.image.description=Open-source accounting application for Indonesian SMEs
            org.opencontainers.image.vendor=PT Artivisi Intermedia
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # arm64 disabled: frontend-maven-plugin fails to download Node.js for
          # musl-arm64 under QEMU emulation (HTTP 404). Sumopod/Biznet primary
          # targets are amd64. Re-enable when frontend build is fixed for arm64.
          platforms: linux/amd64
          push: ${{ steps.fork.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ steps.fork.outputs.push }}
          sbom: ${{ steps.fork.outputs.push }}

      - name: Attest GHCR image
        if: steps.fork.outputs.is_fork == 'false' && steps.build.outputs.digest != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/balaka
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
